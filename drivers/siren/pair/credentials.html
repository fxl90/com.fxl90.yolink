<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: sans-serif; margin: 0; padding: 16px; }
    h2 { margin-top: 0; font-size: 18px; }
    p.hint { color: #666; font-size: 13px; margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px; margin-top: 12px; }
    input { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    button { margin-top: 20px; width: 100%; padding: 10px; background: #0070f3; color: white; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
    button:disabled { background: #aaa; cursor: default; }
    .error { color: #d00; font-size: 13px; margin-top: 10px; display: none; white-space: pre-wrap; }
    .hint-small { color: #888; font-size: 11px; margin-top: 3px; }
    .optional { color: #888; font-weight: normal; font-size: 11px; margin-left: 4px; }
    .status { font-size: 11px; color: #999; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>YoLink Hub Connection</h2>
  <p class="hint">Enter the details from <strong>YoLink App → Settings → Local Hub → Local Network → Integrations → Local API</strong>.</p>

  <label>Hub IP Address</label>
  <input type="text" id="hub_ip" placeholder="e.g. 192.168.1.100" autocomplete="off" />

  <label>Client ID</label>
  <input type="text" id="client_id" autocomplete="off" />

  <label>Client Secret</label>
  <input type="password" id="client_secret" autocomplete="off" />

  <label>Sub-Net ID <span class="optional">(optional)</span></label>
  <input type="text" id="subnet_id" autocomplete="off" placeholder="e.g. SUB1234567890" />
  <p class="hint-small">Found in YoLink App → Settings → Local Hub → Local Network → General. Enables real-time updates via MQTT; without it the app polls every 60s.</p>

  <button type="button" id="btn_connect">Connect</button>
  <p class="error" id="error_msg"></p>
  <p class="status" id="status_msg">Loading…</p>

  <script type="text/javascript">
    // Attach click listener IMMEDIATELY — do not wait for Homey.
    // This guarantees the button responds even if onHomeyReady never fires.
    (function() {
      var btn = document.getElementById('btn_connect');
      var errEl = document.getElementById('error_msg');
      var statusEl = document.getElementById('status_msg');

      function showError(msg) {
        errEl.textContent = msg;
        errEl.style.display = 'block';
      }

      btn.addEventListener('click', function() {
        errEl.style.display = 'none';

        if (typeof Homey === 'undefined') {
          showError('Homey bridge not loaded. Status: ' + statusEl.textContent);
          return;
        }

        var data = {
          hub_ip:        document.getElementById('hub_ip').value.trim(),
          client_id:     document.getElementById('client_id').value.trim(),
          client_secret: document.getElementById('client_secret').value.trim(),
          subnet_id:     document.getElementById('subnet_id').value.trim(),
        };

        if (!data.hub_ip || !data.client_id || !data.client_secret) {
          showError('Hub IP, Client ID and Client Secret are required.');
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Connecting…';

        // Try callback-style first (most reliable across Homey versions)
        try {
          var result = Homey.emit('save_credentials', data, function(err, res) {
            if (err) {
              btn.disabled = false;
              btn.textContent = 'Connect';
              var msg = (err && (err.message || err)) || 'Connection failed.';
              showError(typeof msg === 'string' ? msg : JSON.stringify(msg));
              return;
            }
            Homey.nextView();
          });

          // If emit returned a Promise, handle that too (newer SDK)
          if (result && typeof result.then === 'function') {
            result.then(function() {
              Homey.nextView();
            }).catch(function(err) {
              btn.disabled = false;
              btn.textContent = 'Connect';
              var msg = (err && (err.message || err)) || 'Connection failed.';
              showError(typeof msg === 'string' ? msg : JSON.stringify(msg));
            });
          }
        } catch (e) {
          btn.disabled = false;
          btn.textContent = 'Connect';
          showError('Error: ' + (e.message || e));
        }
      });

      statusEl.textContent = 'Button ready. Waiting for Homey…';
    })();

    function onHomeyReady(Homey) {
      document.getElementById('status_msg').textContent = 'Ready';
      Homey.ready();

      try {
        var p = Homey.emit('get_settings', null, function(err, settings) {
          if (err || !settings) return;
          if (settings.hub_ip)        document.getElementById('hub_ip').value        = settings.hub_ip;
          if (settings.client_id)     document.getElementById('client_id').value     = settings.client_id;
          if (settings.client_secret) document.getElementById('client_secret').value = settings.client_secret;
          if (settings.subnet_id)     document.getElementById('subnet_id').value     = settings.subnet_id;
        });
        if (p && typeof p.then === 'function') {
          p.then(function(settings) {
            if (!settings) return;
            if (settings.hub_ip)        document.getElementById('hub_ip').value        = settings.hub_ip;
            if (settings.client_id)     document.getElementById('client_id').value     = settings.client_id;
            if (settings.client_secret) document.getElementById('client_secret').value = settings.client_secret;
            if (settings.subnet_id)     document.getElementById('subnet_id').value     = settings.subnet_id;
          }).catch(function() {});
        }
      } catch (e) {
        // Pre-fill is best-effort; never block the button
      }
    }
  </script>
</body>
</html>
